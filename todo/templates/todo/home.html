<!DOCTYPE html>
<html>
<head>
    <title>Todo App</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .container {
            background: white;
            padding: 25px;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        form {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            padding: 10px 15px;
            border: none;
            background: #28a745;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #218838;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        li {
            background: #f9f9f9;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-text {
            flex: 1;
        }

        .done {
            text-decoration: line-through;
            color: gray;
        }

        .actions a {
            margin-left: 8px;
            text-decoration: none;
            font-size: 14px;
        }

        .done-btn {
            color: green;
        }

        .delete-btn {
            color: red;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>My Todo App</h1>

    <form method="POST" action="/add/">
        {% csrf_token %}
        <input type="text" name="title" placeholder="Enter task">
        <button type="submit">Add</button>
    </form>

    <ul>
        {% for task in tasks %}
        <li>

            <div class="task-text {% if task.completed %}done{% endif %}">
                {{ task.title }}
            </div>

            <div class="actions">
                <a class="done-btn" href="/toggle/{{ task.id }}/">✔</a>
                <a class="delete-btn" href="/delete/{{ task.id }}/">✖</a>
            </div>

        </li>
        {% endfor %}
    </ul>

</div>

</body>
</html>
